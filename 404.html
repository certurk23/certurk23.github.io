<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7635577322319251" crossorigin="anonymous"></script>
<script>try{var _t=localStorage.getItem('qm-theme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | QUANT_MEDIA</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#111;--text:#e8e8e8;--dim:#888;--accent:#00a651;--border2:#2e2e2e}
[data-theme="light"]{--bg:#f5f5f3;--bg2:#ffffff;--text:#111111;--dim:#555555;--accent:#007a3d;--border2:#d0d0ce}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{text-align:center;max-width:480px}
.code{font-family:'Barlow Condensed',sans-serif;font-size:96px;font-weight:700;color:var(--accent);line-height:1;letter-spacing:-2px}
.code span{color:var(--dim);font-size:72px}
h1{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin:12px 0 8px;color:var(--text)}
p{font-size:14px;color:var(--dim);line-height:1.7;margin-bottom:28px}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:rgba(0,166,81,.08);border:1px solid rgba(0,166,81,.2);padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:24px}
.btn-home{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:4px;background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;text-decoration:none;transition:opacity .14s ease}
.btn-home:hover{opacity:.85}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:4px;background:transparent;border:1px solid var(--border2);color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;text-decoration:none;margin-left:10px;transition:all .14s ease}
.btn-back:hover{color:var(--text);border-color:var(--dim)}
.btns{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px}
.nav-links{margin-top:36px;padding-top:24px;border-top:1px solid var(--border2)}
.nav-links p{font-size:12px;color:var(--dim);margin-bottom:12px}
.nav-links a{display:inline-block;margin:4px 8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .14s ease}
.nav-links a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">4<span>0</span>4</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <div class="mono">ERROR: resource_not_found</div>
  <div class="btns">
    <a href="index.html" class="btn-home">← Back to Home</a>
    <a href="javascript:history.back()" class="btn-back">Go Back</a>
  </div>
  <div class="nav-links">
    <p>Try one of these instead:</p>
    <a href="markets.html">Live Data</a>
    <a href="stocks.html">Equities</a>
    <a href="papers.html">Analysis</a>
    <a href="research.html">Research</a>
    <a href="infrastructure.html">Infrastructure</a>
    <a href="about.html">About</a>
  </div>
</div>
</body>
</html>
