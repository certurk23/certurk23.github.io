<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accentFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00a651" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00a651" stop-opacity="1"/>
      <stop offset="80%" stop-color="#00a651" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00a651" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentFade)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5" fill="none">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Quill/feather icon (geometric) -->
  <g transform="translate(600, 200)" opacity="0.08">
    <path d="M0,-120 C30,-100 50,-60 40,-10 C35,15 20,40 0,60 C-20,40 -35,15 -40,-10 C-50,-60 -30,-100 0,-120Z" fill="#00a651"/>
    <line x1="0" y1="-100" x2="0" y2="80" stroke="#00a651" stroke-width="2"/>
    <line x1="0" y1="-60" x2="25" y2="-40" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="-30" x2="22" y2="-15" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="0" x2="18" y2="10" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="-60" x2="-25" y2="-40" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="-30" x2="-22" y2="-15" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="0" x2="-18" y2="10" stroke="#00a651" stroke-width="1"/>
  </g>

  <!-- Small quill icon next to title -->
  <g transform="translate(335, 295) scale(0.4)" fill="#00a651" opacity="0.9">
    <path d="M0,-50 C12,-42 22,-25 18,-5 C16,8 9,18 0,26 C-9,18 -16,8 -18,-5 C-22,-25 -12,-42 0,-50Z"/>
    <line x1="0" y1="-40" x2="0" y2="35" stroke="#00a651" stroke-width="2"/>
    <line x1="0" y1="-25" x2="10" y2="-16" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="-10" x2="9" y2="-3" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="-25" x2="-10" y2="-16" stroke="#00a651" stroke-width="1"/>
    <line x1="0" y1="-10" x2="-9" y2="-3" stroke="#00a651" stroke-width="1"/>
  </g>

  <!-- Main title: QUANT_MEDIA -->
  <text x="600" y="310" text-anchor="middle"
        font-family="'Barlow Condensed', 'Arial Narrow', 'Helvetica Neue', sans-serif"
        font-size="96" font-weight="700" letter-spacing="8" fill="#ffffff">
    QUANT_MEDIA
  </text>

  <!-- Decorative line under title -->
  <rect x="440" y="335" width="320" height="1.5" fill="#00a651" opacity="0.6" rx="1"/>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle"
        font-family="'Barlow Condensed', 'Arial Narrow', 'Helvetica Neue', sans-serif"
        font-size="24" font-weight="400" letter-spacing="3" fill="#888888">
    US FINANCIAL INTELLIGENCE · CERTURK RESEARCH
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0d0d0d"/>
  <rect x="0" y="580" width="1200" height="1" fill="#1a1a1a"/>

  <!-- Bottom URL -->
  <text x="600" y="613" text-anchor="middle"
        font-family="'Barlow Condensed', 'Courier New', monospace"
        font-size="20" font-weight="500" letter-spacing="4" fill="#00a651">
    quantmedia.io
  </text>
</svg>
